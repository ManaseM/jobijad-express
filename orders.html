<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders - Jobijad Express</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Roboto',sans-serif;background:#f4f6f8;color:#222;min-height:100vh;}
.header{background:#1a1a2e;padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.3);position:sticky;top:0;z-index:100;}
.logo{font-size:18px;font-weight:700;color:#fff;}.logo span{color:#f97316;}
.back-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
.back-btn:hover{background:rgba(255,255,255,.22);}
.container{max-width:900px;margin:0 auto;padding:28px 16px;}
.page-title{font-size:22px;font-weight:700;color:#1a1a2e;margin-bottom:6px;}
.page-sub{font-size:13px;color:#888;margin-bottom:24px;}
.tabs{display:flex;gap:0;border-bottom:2px solid #e0e0e0;margin-bottom:24px;}
.tab{padding:10px 22px;font-size:13px;font-weight:600;color:#888;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;}
.tab.active{color:#f97316;border-bottom-color:#f97316;}
.tab-content{display:none;}.tab-content.active{display:block;}
.order-card{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:16px;overflow:hidden;}
.order-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #f0f0f0;flex-wrap:wrap;gap:8px;}
.order-num{font-size:13px;font-weight:700;color:#1a1a2e;font-family:monospace;}
.order-date{font-size:11px;color:#aaa;}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;}
.badge-pending{background:#fef9c3;color:#854d0e;}.badge-confirmed{background:#dbeafe;color:#1e40af;}
.badge-processing{background:#ede9fe;color:#5b21b6;}.badge-shipped{background:#dcfce7;color:#15803d;}
.badge-delivered{background:#dcfce7;color:#15803d;}.badge-cancelled{background:#fee2e2;color:#991b1b;}
.order-body{padding:14px 18px;}
.order-item-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f8f8f8;font-size:13px;color:#555;align-items:center;}
.order-item-img{width:36px;height:36px;object-fit:cover;border-radius:5px;margin-right:8px;flex-shrink:0;}
.order-totals{display:flex;justify-content:flex-end;gap:24px;font-size:13px;margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0;}
.order-total-val{font-weight:700;color:#f97316;font-size:16px;}
.order-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.btn{padding:7px 16px;border-radius:6px;font-size:12px;cursor:pointer;border:none;font-family:inherit;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:all .2s;}
.btn-primary{background:#f97316;color:#fff;}.btn-primary:hover{background:#ea6c0a;}
.btn-secondary{background:#f4f6f8;color:#555;border:1px solid #e0e0e0;}.btn-secondary:hover{background:#e8eaed;}
.empty-state{text-align:center;padding:60px 20px;color:#aaa;}
.empty-state i{font-size:48px;color:#e0e0e0;margin-bottom:12px;display:block;}
.empty-state a{color:#f97316;text-decoration:none;font-weight:600;}
.loading{text-align:center;padding:40px;color:#aaa;}
.review-form-card{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.07);padding:24px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:11px;font-weight:700;color:#666;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.form-group input,.form-group textarea{width:100%;padding:10px 12px;border:1.5px solid #e0e0e0;border-radius:7px;font-size:13px;outline:none;font-family:inherit;}
.form-group input:focus,.form-group textarea:focus{border-color:#f97316;}
.stars{display:flex;gap:6px;margin-bottom:4px;}
.star{font-size:28px;color:#e0e0e0;cursor:pointer;transition:color .15s;}.star.active{color:#f97316;}
.fb-msg{padding:10px 14px;border-radius:7px;font-size:13px;margin-top:10px;display:none;}
.fb-msg.success{background:#dcfce7;color:#15803d;display:block;}
.fb-msg.error{background:#fee2e2;color:#991b1b;display:block;}
.reviews-summary{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.07);padding:20px 24px;margin-bottom:18px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.avg-score{font-size:48px;font-weight:700;color:#f97316;line-height:1;}
.avg-label{font-size:13px;color:#888;}
.review-card{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.07);padding:18px 20px;margin-bottom:14px;}
.review-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px;}
.reviewer-name{font-weight:700;font-size:14px;color:#1a1a2e;}
.review-stars{color:#f97316;font-size:14px;}
.review-date{font-size:11px;color:#bbb;}
.review-comment{font-size:13px;color:#555;line-height:1.6;margin-bottom:10px;}
.admin-reply{border:2px solid #f97316;border-radius:8px;padding:12px 14px;background:#fff7ed;margin-top:10px;}
.admin-reply-label{font-size:11px;font-weight:700;color:#f97316;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.admin-reply-text{font-size:13px;color:#555;line-height:1.6;}
.delivery-box{margin-top:10px;padding:10px 12px;background:#f0fdf4;border:1.5px solid #22c55e;border-radius:8px;font-size:12px;}
.delivery-box-title{font-weight:700;color:#15803d;margin-bottom:6px;}
/* Receipt modal */
.receipt-modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;align-items:center;justify-content:center;padding:12px;}
.receipt-modal-wrap.open{display:flex;}
.receipt-modal-inner{background:#fff;border-radius:12px;width:100%;max-width:600px;max-height:94vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.3);}
.rc-td{padding:9px 10px;border-bottom:1px solid #f0f0f0;font-size:13px;color:#333;}
.rc-center{text-align:center;}.rc-right{text-align:right;}.rc-bold{font-weight:700;color:#f97316;}
@media(max-width:480px){
  .receipt-modal-inner{border-radius:10px 10px 0 0;position:fixed;bottom:0;left:0;right:0;max-height:88vh;}
  .receipt-modal-wrap{align-items:flex-end;padding:0;}
}
</style>
</head>
<body>
<header class="header">
  <div class="logo">Jobijad <span>Express</span></div>
  <a href="alibaba-style.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Store</a>
</header>
<div class="container">
  <div class="page-title"><i class="fas fa-box" style="color:#f97316;margin-right:8px"></i>Orders &amp; Reviews</div>
  <div class="page-sub">Track your orders, view receipts, and leave feedback.</div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('orders')"><i class="fas fa-box"></i> My Orders</button>
    <button class="tab" onclick="switchTab('review')"><i class="fas fa-star"></i> Leave a Review</button>
    <button class="tab" onclick="switchTab('public')"><i class="fas fa-comments"></i> Customer Reviews</button>
  </div>
  <div id="tab-orders" class="tab-content active">
    <div id="orders-list"><div class="loading"><i class="fas fa-spinner fa-spin" style="font-size:24px;color:#f97316"></i><p style="margin-top:8px">Loading orders...</p></div></div>
  </div>
  <div id="tab-review" class="tab-content">
    <div class="review-form-card">
      <h3 style="font-size:16px;font-weight:700;color:#1a1a2e;margin-bottom:6px;"><i class="fas fa-comment-dots" style="color:#f97316;margin-right:8px"></i>Leave a Review</h3>
      <p style="font-size:13px;color:#888;margin-bottom:18px;">Your honest opinion helps us improve.</p>
      <div class="form-group">
        <label>Your Name <span style="color:#aaa;font-weight:400;font-size:10px">(optional)</span></label>
        <input type="text" id="fb-name" placeholder="Leave blank to post as Anonymous">
      </div>
      <div class="form-group">
        <label>Rating</label>
        <div class="stars" id="stars-row">
          <span class="star" data-v="1">&#9733;</span>
          <span class="star" data-v="2">&#9733;</span>
          <span class="star" data-v="3">&#9733;</span>
          <span class="star" data-v="4">&#9733;</span>
          <span class="star" data-v="5">&#9733;</span>
        </div>
        <input type="hidden" id="fb-rating" value="5">
        <small style="color:#aaa;font-size:11px">Tap a star to rate</small>
      </div>
      <div class="form-group">
        <label>Your Message *</label>
        <textarea id="fb-comment" rows="4" placeholder="Write anything — a compliment, complaint, suggestion..."></textarea>
      </div>
      <button class="btn btn-primary" onclick="submitFeedback()" style="width:100%;justify-content:center;padding:11px;"><i class="fas fa-paper-plane"></i> Submit Review</button>
      <div id="fb-msg" class="fb-msg"></div>
    </div>
  </div>
  <div id="tab-public" class="tab-content">
    <div id="reviews-summary-box"></div>
    <div id="public-reviews-list"><div class="loading"><i class="fas fa-spinner fa-spin" style="font-size:24px;color:#f97316"></i><p style="margin-top:8px">Loading reviews...</p></div></div>
  </div>
</div>

<!-- Receipt Modal -->
<div id="receipt-modal" class="receipt-modal-wrap" onclick="if(event.target===this)closeReceipt()">
  <div class="receipt-modal-inner">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 style="font-size:16px;font-weight:700;color:#1a1a2e;margin:0;"><i class="fas fa-receipt" style="color:#f97316;margin-right:8px"></i>Order Receipt</h3>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" onclick="printOrderReceipt()"><i class="fas fa-print"></i> Print</button>
        <button class="btn btn-secondary" onclick="closeReceipt()"><i class="fas fa-times"></i></button>
      </div>
    </div>
    <div id="receipt-body"></div>
  </div>
</div>

<script>
var API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:3000/api' : window.location.origin + '/api';
var token = localStorage.getItem('jobiToken');
var currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(function(t,i){ t.classList.remove('active'); });
  document.querySelectorAll('.tab-content').forEach(function(c){ c.classList.remove('active'); });
  var map = {orders:0, review:1, public:2};
  document.querySelectorAll('.tab')[map[name]].classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'orders') loadOrders();
  if (name === 'public') loadPublicReviews();
}

function fmtDate(d) {
  if (!d) return '---';
  return new Date(d).toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
}

function fmtMoney(v) {
  return '$' + (parseFloat(v) || 0).toFixed(2);
}

function setRating(val) {
  document.getElementById('fb-rating').value = val;
  document.querySelectorAll('#stars-row .star').forEach(function(s, i) {
    s.classList.toggle('active', i < val);
  });
}
document.querySelectorAll('#stars-row .star').forEach(function(el) {
  el.addEventListener('click', function() { setRating(parseInt(el.getAttribute('data-v'))); });
});
setRating(5);

// ===== LOAD ORDERS =====
// Merges server orders (if logged in) with locally-saved guest orders
function loadOrders() {
  var list = document.getElementById('orders-list');
  list.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin" style="font-size:24px;color:#f97316"></i><p style="margin-top:8px">Loading...</p></div>';

  var localOrders = JSON.parse(localStorage.getItem('jobiOrders') || '[]');

  if (!token) {
    // Guest — show only local orders
    renderOrderList(localOrders, list);
    return;
  }

  fetch(API + '/orders/my', { headers: { Authorization: 'Bearer ' + token } })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var serverOrders = data.orders || [];
      // Merge: server orders take priority, append local-only ones
      var serverIds = serverOrders.map(function(o) { return o.id || o.orderNumber; });
      var localOnly = localOrders.filter(function(o) {
        return !serverIds.includes(o.id) && !serverIds.includes(o.orderNumber);
      });
      var all = serverOrders.concat(localOnly);
      renderOrderList(all, list);
    })
    .catch(function() {
      // Server unreachable — show local orders
      renderOrderList(localOrders, list);
    });
}

function renderOrderList(orders, list) {
  if (!orders || !orders.length) {
    list.innerHTML = '<div class="empty-state"><i class="fas fa-box"></i><p>No orders yet. <a href="alibaba-style.html">Start shopping!</a></p></div>';
    return;
  }
  // Sort newest first
  orders.sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); });
  var html = '';
  orders.forEach(function(o) {
    var rNum = o.orderNumber || (o.id ? String(o.id).substring(0, 8).toUpperCase() : 'N/A');
    var items = o.items || [];
    var status = o.orderStatus || 'pending';
    var iHtml = '';
    items.forEach(function(it) {
      iHtml += '<div class="order-item-row">';
      if (it.image) iHtml += '<img class="order-item-img" src="' + it.image + '" alt="' + (it.name||'') + '">';
      iHtml += '<span style="flex:1">' + (it.name || 'Item') + ' &times;' + (it.quantity || 1) + '</span>';
      iHtml += '<span style="font-weight:600;color:#f97316">' + fmtMoney((parseFloat(it.price)||0) * (it.quantity||1)) + '</span>';
      iHtml += '</div>';
    });
    var payLabel = (o.paymentMethod || '').replace(/_/g, ' ');
    html += '<div class="order-card">';
    html += '<div class="order-head">';
    html += '<div><div class="order-num"><i class="fas fa-hashtag" style="color:#f97316;font-size:10px;margin-right:2px"></i>' + rNum + '</div>';
    html += '<div class="order-date">' + fmtDate(o.createdAt) + ' &nbsp;|&nbsp; ' + payLabel + '</div></div>';
    html += '<span class="badge badge-' + status + '">' + status + '</span>';
    html += '</div>';
    html += '<div class="order-body">';
    html += iHtml;
    html += '<div class="order-totals"><span style="color:#888;font-size:12px">Total:</span>';
    html += '<span class="order-total-val">' + fmtMoney(o.total) + '</span></div>';
    if (o.shippingDate || o.estimatedDelivery || o.deliveryNote) {
      html += '<div class="delivery-box"><div class="delivery-box-title"><i class="fas fa-truck"></i> Delivery Schedule</div>';
      if (o.shippingDate) html += '<div style="color:#555;margin-bottom:3px"><i class="fas fa-box-open" style="color:#f97316;margin-right:5px"></i><strong>Ships:</strong> ' + fmtDate(o.shippingDate) + '</div>';
      if (o.estimatedDelivery) html += '<div style="color:#555;margin-bottom:3px"><i class="fas fa-calendar-check" style="color:#22c55e;margin-right:5px"></i><strong>Est. Delivery:</strong> ' + fmtDate(o.estimatedDelivery) + '</div>';
      if (o.deliveryNote) html += '<div style="color:#666;margin-top:6px;font-style:italic">' + o.deliveryNote + '</div>';
      html += '</div>';
    }
    var oid = o.id || o.orderNumber || '';
    html += '<div class="order-actions">';
    html += '<button class="btn btn-secondary" onclick="openReceipt(' + JSON.stringify(o) + ')"><i class="fas fa-receipt"></i> View Receipt</button>';
    if (token && oid && !String(oid).startsWith('JE-')) {
      html += '<button class="btn btn-secondary" onclick="openReceiptFromServer(\'' + oid + '\')"><i class="fas fa-cloud-download-alt"></i> Full Receipt</button>';
    }
    html += '</div>';
    html += '</div></div>';
  });
  list.innerHTML = html;
}
</script>

<script>
// ===== RECEIPT =====
function buildReceiptHTML(o) {
  var rNum = o.orderNumber || (o.id ? String(o.id).substring(0,8).toUpperCase() : 'N/A');
  var items = o.items || [];
  var addr = o.shippingAddress || {};
  var status = o.orderStatus || 'pending';
  var statusColors = { delivered:'#22c55e', cancelled:'#ef4444', shipped:'#3b82f6', confirmed:'#8b5cf6', processing:'#f59e0b' };
  var sc = statusColors[status] || '#f97316';

  var rows = '';
  items.forEach(function(it) {
    var lineTotal = (parseFloat(it.price)||0) * (it.quantity||1);
    rows += '<tr>';
    rows += '<td class="rc-td">' + (it.name||'Item') + '</td>';
    rows += '<td class="rc-td rc-center">' + (it.quantity||1) + '</td>';
    rows += '<td class="rc-td rc-right">$' + (parseFloat(it.price)||0).toFixed(2) + '</td>';
    rows += '<td class="rc-td rc-right rc-bold">$' + lineTotal.toFixed(2) + '</td>';
    rows += '</tr>';
  });

  var payMethod = (o.paymentMethod||'').replace(/_/g,' ');
  var payIcon = o.paymentMethod==='swish'?'fas fa-mobile-alt':o.paymentMethod==='paypal'?'fab fa-paypal':o.paymentMethod==='credit_card'?'fas fa-credit-card':'fas fa-hand-holding-usd';

  var html = '<div id="receipt-print">';

  // ── HEADER BAND ──
  html += '<div style="background:linear-gradient(135deg,#1a1a2e 0%,#0f3460 100%);border-radius:10px 10px 0 0;padding:24px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">';
  html += '<div style="display:flex;align-items:center;gap:14px;">';
  html += '<img src="pics/logo_white.png" alt="Jobijad Express" style="height:56px;width:auto;object-fit:contain;filter:brightness(1.3) drop-shadow(0 0 8px rgba(255,255,255,.6));">';
  html += '<div>';
  html += '<div style="font-size:18px;font-weight:800;color:#fff;letter-spacing:.5px;">Jobijad <span style="color:#f97316;">Express</span></div>';
  html += '<div style="font-size:11px;color:rgba(255,255,255,.6);margin-top:2px;">Premium African Fashion</div>';
  html += '</div></div>';
  html += '<div style="text-align:right;">';
  html += '<div style="font-size:11px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;">Receipt</div>';
  html += '<div style="font-size:20px;font-weight:800;color:#f97316;font-family:monospace;">#' + rNum + '</div>';
  html += '<div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:2px;">' + fmtDate(o.createdAt) + '</div>';
  html += '</div></div>';

  // ── STATUS RIBBON ──
  html += '<div style="background:' + sc + ';padding:6px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;">';
  html += '<span style="font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:1px;"><i class="fas fa-circle" style="font-size:7px;margin-right:5px;"></i>Order Status: ' + status.toUpperCase() + '</span>';
  html += '<span style="font-size:11px;color:rgba(255,255,255,.85);">' + fmtDate(o.createdAt) + '</span>';
  html += '</div>';

  // ── BODY ──
  html += '<div style="background:#fff;border-radius:0 0 10px 10px;padding:24px 28px;">';

  // Billing + Shipping info
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:22px;padding-bottom:18px;border-bottom:1.5px dashed #e0e0e0;">';
  html += '<div>';
  html += '<div style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Ship To</div>';
  html += '<div style="font-size:14px;font-weight:700;color:#1a1a2e;">' + (addr.name||'—') + '</div>';
  if (addr.phone) html += '<div style="font-size:12px;color:#666;margin-top:3px;"><i class="fas fa-phone" style="color:#f97316;margin-right:4px;font-size:10px;"></i>' + addr.phone + '</div>';
  if (addr.street) html += '<div style="font-size:12px;color:#666;margin-top:3px;">' + addr.street + '</div>';
  html += '<div style="font-size:12px;color:#666;">' + [addr.city, addr.state, addr.country].filter(Boolean).join(', ') + '</div>';
  html += '</div>';
  html += '<div>';
  html += '<div style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Payment</div>';
  html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">';
  html += '<i class="' + payIcon + '" style="color:#f97316;font-size:16px;"></i>';
  html += '<span style="font-size:13px;font-weight:600;color:#1a1a2e;text-transform:capitalize;">' + payMethod + '</span>';
  html += '</div>';
  if (o.swishNumber) html += '<div style="font-size:12px;color:#666;">Swish: ' + o.swishNumber + '</div>';
  if (o.codPhone) html += '<div style="font-size:12px;color:#666;">Delivery phone: ' + o.codPhone + '</div>';
  html += '<div style="margin-top:8px;display:inline-block;background:' + sc + '22;border:1px solid ' + sc + ';color:' + sc + ';font-size:10px;font-weight:700;padding:2px 10px;border-radius:10px;text-transform:uppercase;">' + status + '</div>';
  html += '</div></div>';

  // Items table
  html += '<div style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">Order Items</div>';
  html += '<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:20px;">';
  html += '<thead><tr style="background:#f8f9fa;">';
  html += '<th style="padding:9px 10px;text-align:left;font-size:11px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #e0e0e0;">Item</th>';

  html += '<div style="font-size:12px;color:#555;"><i class="fas fa-phone" style="color:#f97316;margin-right:4px;"></i>+46 762 593 231</div>';

  html += '<div style="text-align:center;">';
  html += '<img src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=JOBIJAD-' + rNum + '" style="width:72px;height:72px;border:2px solid #e0e0e0;border-radius:6px;display:block;" alt="QR">';
  html += '<div style="font-size:9px;color:#bbb;margin-top:3px;">Scan to verify</div>';

  html += '<div style="text-align:center;margin-top:16px;font-size:12px;color:#aaa;font-style:italic;">Thank you for shopping with Jobijad Express! &#10084;</div>';
  html += '</div>'; // end body

  return html;
}

function openReceipt(orderObj) {
  var o = typeof orderObj === 'string' ? JSON.parse(orderObj) : orderObj;
  document.getElementById('receipt-body').innerHTML = buildReceiptHTML(o);
  document.getElementById('receipt-modal').classList.add('open');
}

function openReceiptFromServer(orderId) {
  if (!token) return;
  fetch(API + '/orders/' + orderId, { headers: { Authorization: 'Bearer ' + token } })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var o = data.order || data;
      document.getElementById('receipt-body').innerHTML = buildReceiptHTML(o);
      document.getElementById('receipt-modal').classList.add('open');
    })
    .catch(function() { alert('Could not load receipt from server.'); });
}

function closeReceipt() {
  document.getElementById('receipt-modal').classList.remove('open');
}

function printOrderReceipt() {
  var content = document.getElementById('receipt-print');
  if (!content) return;
  var w = window.open('', '_blank', 'width=680,height=900');
  w.document.write('<!DOCTYPE html><html><head><title>Receipt - Jobijad Express</title>');
  w.document.write('<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">');
  w.document.write('<style>');
  w.document.write('*{box-sizing:border-box;margin:0;padding:0;}');
  w.document.write('body{font-family:Arial,Helvetica,sans-serif;background:#f4f6f8;padding:20px;}');
  w.document.write('.rc-wrap{max-width:600px;margin:0 auto;box-shadow:0 4px 24px rgba(0,0,0,.12);border-radius:10px;overflow:hidden;}');
  w.document.write('table{width:100%;border-collapse:collapse;}');
  w.document.write('.rc-td{padding:9px 10px;border-bottom:1px solid #f0f0f0;font-size:13px;color:#333;}');
  w.document.write('.rc-center{text-align:center;}.rc-right{text-align:right;}.rc-bold{font-weight:700;}');
  w.document.write('@media print{body{background:#fff;padding:0;}.no-print{display:none!important;}.rc-wrap{box-shadow:none;}}');
  w.document.write('</style></head><body>');
  w.document.write('<div class="rc-wrap">' + content.innerHTML + '</div>');
  w.document.write('<div class="no-print" style="max-width:600px;margin:16px auto;display:flex;gap:10px;">');
  w.document.write('<button onclick="window.print()" style="flex:1;padding:12px;background:#f97316;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;">&#128438; Print Receipt</button>');
  w.document.write('<button onclick="window.close()" style="padding:12px 20px;background:#f4f6f8;color:#555;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;cursor:pointer;">Close</button>');
  w.document.write('</div></body></html>');
  w.document.close();
  w.focus();
  setTimeout(function() { w.print(); }, 600);
}

// ===== FEEDBACK =====
function submitFeedback() {
  var name = document.getElementById('fb-name').value.trim();
  var rating = parseInt(document.getElementById('fb-rating').value) || 5;
  var comment = document.getElementById('fb-comment').value.trim();
  if (!comment) { showFbMsg('Please write something!', true); return; }
  var payload = { rating: rating, comment: comment, message: comment, customerName: name || 'Anonymous' };
  var headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  fetch(API + '/feedback', { method: 'POST', headers: headers, body: JSON.stringify(payload) })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.feedback || data.id || data._id) {
        showFbMsg('Thank you! Your review has been submitted.', false);
        document.getElementById('fb-comment').value = '';
        setRating(5);
      } else {
        showFbMsg(data.message || 'Could not submit.', true);
      }
    })
    .catch(function() { showFbMsg('Server error. Please try again.', true); });
}

function showFbMsg(msg, isError) {
  var el = document.getElementById('fb-msg');
  el.textContent = msg;
  el.className = 'fb-msg ' + (isError ? 'error' : 'success');
  el.style.display = 'block';
}

// ===== PUBLIC REVIEWS =====
function loadPublicReviews() {
  var list = document.getElementById('public-reviews-list');
  var box = document.getElementById('reviews-summary-box');
  list.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin" style="font-size:24px;color:#f97316"></i><p style="margin-top:8px">Loading...</p></div>';
  fetch(API + '/feedback')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var reviews = data.feedbacks || data.feedback || [];
      if (!reviews.length) {
        box.innerHTML = '';
        list.innerHTML = '<div class="empty-state"><i class="fas fa-star"></i><p>No reviews yet. Be the first!</p></div>';
        return;
      }
      var total = 0;
      reviews.forEach(function(r) { total += parseInt(r.rating) || 0; });
      var avg = (total / reviews.length).toFixed(1);
      var ar = Math.round(parseFloat(avg));
      var ss = '';
      for (var i = 1; i <= 5; i++) ss += i <= ar ? '&#9733;' : '&#9734;';
      box.innerHTML = '<div class="reviews-summary"><div class="avg-score">' + avg + '</div><div><div class="review-stars" style="font-size:22px;">' + ss + '</div><div class="avg-label">' + reviews.length + ' review' + (reviews.length !== 1 ? 's' : '') + '</div></div></div>';
      var html = '';
      reviews.forEach(function(r) {
        var rn = r.customerName || (r.User && r.User.name) || 'Anonymous';
        var rs = '';
        var rv = parseInt(r.rating) || 0;
        for (var k = 1; k <= 5; k++) rs += k <= rv ? '&#9733;' : '&#9734;';
        html += '<div class="review-card">';
        html += '<div class="review-header"><div><div class="reviewer-name"><i class="fas fa-user-circle" style="color:#f97316;margin-right:5px;"></i>' + rn + '</div>';
        html += '<div class="review-stars">' + rs + '</div></div>';
        html += '<div class="review-date">' + fmtDate(r.createdAt) + '</div></div>';
        html += '<div class="review-comment">' + (r.comment || '') + '</div>';
        if (r.adminReply) {
          html += '<div class="admin-reply"><div class="admin-reply-label"><i class="fas fa-store"></i> Jobijad Express replied:</div>';
          html += '<div class="admin-reply-text">' + r.adminReply + '</div></div>';
        }
        html += '</div>';
      });
      list.innerHTML = html;
    })
    .catch(function() {
      box.innerHTML = '';
      list.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Could not load reviews.</p></div>';
    });
}
