<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Jobijad Express</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Roboto',sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

/* Decorative circles matching homepage hero */
body::before{
  content:'';position:absolute;
  width:480px;height:480px;
  background:rgba(249,115,22,.08);
  border-radius:50%;
  bottom:-140px;left:-120px;
  pointer-events:none;
}
body::after{
  content:'';position:absolute;
  width:340px;height:340px;
  background:rgba(249,115,22,.06);
  border-radius:50%;
  top:-80px;right:60px;
  pointer-events:none;
}

/* Floating dots */
.dot{
  position:absolute;border-radius:50%;
  background:rgba(249,115,22,.15);
  pointer-events:none;
}
.dot1{width:12px;height:12px;top:18%;left:12%;}
.dot2{width:8px;height:8px;top:60%;left:6%;}
.dot3{width:16px;height:16px;top:30%;right:10%;}
.dot4{width:10px;height:10px;bottom:20%;right:18%;}

.card{
  background:rgba(255,255,255,.04);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:20px;
  padding:44px 40px 38px;
  width:100%;max-width:460px;
  position:relative;z-index:1;
  box-shadow:0 32px 80px rgba(0,0,0,.45);
}

/* Logo */
.brand{text-align:center;margin-bottom:28px;}
.brand-name{font-size:26px;font-weight:700;color:#fff;letter-spacing:.5px;}
.brand-name span{color:#f97316;}
.brand-sub{font-size:12px;color:rgba(255,255,255,.45);margin-top:3px;letter-spacing:1px;text-transform:uppercase;}

/* Icon */
.brand-icon{
  width:64px;height:64px;
  background:linear-gradient(135deg,#f97316,#ea6c0a);
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;
  box-shadow:0 8px 24px rgba(249,115,22,.4);
  font-size:26px;color:#fff;
}

/* Tabs */
.tabs{
  display:flex;
  background:rgba(255,255,255,.08);
  border-radius:10px;
  padding:4px;
  margin-bottom:22px;
  border:1px solid rgba(255,255,255,.1);
}
.tab{
  flex:1;padding:9px;border:none;background:none;
  color:rgba(255,255,255,.55);
  font-size:13px;font-weight:600;
  border-radius:7px;transition:all .2s;cursor:pointer;
  font-family:inherit;letter-spacing:.5px;
}
.tab.active{
  background:linear-gradient(135deg,#f97316,#ea6c0a);
  color:#fff;
  box-shadow:0 4px 12px rgba(249,115,22,.35);
}
.tab:hover:not(.active){color:rgba(255,255,255,.8);}

/* Error */
.error-msg{
  background:rgba(239,68,68,.18);
  border:1px solid rgba(239,68,68,.4);
  color:#fca5a5;
  border-radius:8px;padding:10px 14px;
  font-size:13px;margin-bottom:14px;display:none;
}

/* Input groups */
.input-group{position:relative;margin-bottom:14px;}
.input-group .ico{
  position:absolute;left:14px;top:50%;
  transform:translateY(-50%);
  pointer-events:none;
  color:rgba(255,255,255,.4);
  font-size:14px;
}
.input-group input{
  width:100%;
  background:rgba(255,255,255,.08);
  border:1.5px solid rgba(255,255,255,.15);
  border-radius:9px;
  padding:13px 14px 13px 42px;
  color:#fff;font-size:13px;
  outline:none;transition:all .2s;
  font-family:inherit;
}
.input-group input::placeholder{color:rgba(255,255,255,.35);font-size:12px;letter-spacing:.5px;}
.input-group input:focus{
  border-color:#f97316;
  background:rgba(249,115,22,.08);
  box-shadow:0 0 0 3px rgba(249,115,22,.15);
}

/* Main button */
.main-btn{
  width:100%;
  background:linear-gradient(135deg,#f97316,#ea6c0a);
  color:#fff;border:none;
  border-radius:9px;padding:14px;
  font-size:14px;font-weight:700;
  letter-spacing:1.5px;cursor:pointer;
  margin-top:6px;
  transition:all .2s;
  font-family:inherit;
  box-shadow:0 6px 20px rgba(249,115,22,.35);
  position:relative;overflow:hidden;
}
.main-btn::after{
  content:'';position:absolute;
  inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);
  transform:translateX(-100%);transition:transform .5s;
}
.main-btn:hover::after{transform:translateX(100%);}
.main-btn:hover{box-shadow:0 8px 28px rgba(249,115,22,.5);transform:translateY(-1px);}
.main-btn:disabled{background:#555;box-shadow:none;cursor:not-allowed;transform:none;}

/* Forgot */
.forgot{text-align:right;margin-top:10px;}
.forgot a{color:rgba(255,255,255,.45);font-size:12px;cursor:pointer;transition:color .2s;}
.forgot a:hover{color:#f97316;}

/* Bottom link */
.bottom-link{text-align:center;margin-top:20px;font-size:13px;color:rgba(255,255,255,.45);}
.bottom-link a{color:#f97316;font-weight:600;cursor:pointer;transition:color .2s;}
.bottom-link a:hover{color:#fb923c;}

/* Divider */
.divider{display:flex;align-items:center;gap:10px;margin:18px 0 14px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1);}
.divider span{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:1px;}

/* Back to store */
.back-store{
  text-align:center;margin-top:18px;
  font-size:12px;color:rgba(255,255,255,.3);
}
.back-store a{
  color:rgba(255,255,255,.45);
  display:inline-flex;align-items:center;gap:5px;
  transition:color .2s;
}
.back-store a:hover{color:#f97316;}

@media(max-width:500px){
  .card{padding:32px 22px 28px;margin:16px;}
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<span class="dot dot1"></span>
<span class="dot dot2"></span>
<span class="dot dot3"></span>
<span class="dot dot4"></span>

<div class="card">
  <div class="brand">
    <div class="brand-icon" style="background:none;box-shadow:none;width:auto;height:auto;">
      <img src="pics/logo_white.png" alt="Jobijad Express" style="height:120px;width:auto;object-fit:contain;filter:brightness(1.4) drop-shadow(0 0 6px #fff) drop-shadow(0 0 16px #fff) drop-shadow(0 0 35px rgba(255,255,255,.8));">
    </div>
    <div class="brand-name">Jobijad <span>Express</span></div>
    <div class="brand-sub">Premium African Fashion</div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="switchTab('login')">Login</button>
    <button class="tab" id="tab-register" onclick="switchTab('register')">Register</button>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <!-- Login form -->
  <div id="form-login">
    <div class="input-group">
      <span class="ico"><i class="fas fa-envelope"></i></span>
      <input type="email" id="l-email" placeholder="EMAIL ADDRESS" autocomplete="email">
    </div>
    <div class="input-group">
      <span class="ico"><i class="fas fa-lock"></i></span>
      <input type="password" id="l-pass" placeholder="PASSWORD">
    </div>
    <button class="main-btn" id="login-btn" onclick="doLogin()">LOGIN</button>
    <div class="forgot"><a onclick="showForgotPassword()">Forgot password?</a></div>
  </div>

  <!-- Forgot Password form -->
  <div id="form-forgot" style="display:none">
    <p style="color:rgba(255,255,255,.6);font-size:13px;margin-bottom:14px;text-align:center;">Enter your email and we'll send a reset link.</p>
    <div class="input-group">
      <span class="ico"><i class="fas fa-envelope"></i></span>
      <input type="email" id="fp-email" placeholder="EMAIL ADDRESS">
    </div>
    <button class="main-btn" id="fp-btn" onclick="doForgotPassword()">SEND RESET LINK</button>
    <div class="forgot" style="text-align:center;margin-top:12px;"><a onclick="switchTab('login')"><i class="fas fa-arrow-left" style="margin-right:4px"></i>Back to Login</a></div>
  </div>

  <!-- Register form -->
  <div id="form-register" style="display:none">
    <div class="input-group">
      <span class="ico"><i class="fas fa-user"></i></span>
      <input type="text" id="r-name" placeholder="FULL NAME">
    </div>
    <div class="input-group">
      <span class="ico"><i class="fas fa-envelope"></i></span>
      <input type="email" id="r-email" placeholder="EMAIL ADDRESS">
    </div>
    <div class="input-group">
      <span class="ico"><i class="fas fa-lock"></i></span>
      <input type="password" id="r-pass" placeholder="PASSWORD (min 6 chars)">
    </div>
    <button class="main-btn" id="register-btn" onclick="doRegister()">CREATE ACCOUNT</button>
  </div>

  <div class="divider"><span>OR CONTINUE WITH</span></div>

  <div style="display:flex;gap:12px;margin-bottom:16px;">
    <button onclick="doGoogleLogin()" style="flex:1;display:flex;align-items:center;justify-content:center;gap:10px;padding:12px 16px;background:#fff;border:1.5px solid rgba(255,255,255,.2);border-radius:9px;font-size:13px;font-weight:600;color:#333;cursor:pointer;transition:all .2s;font-family:inherit;box-shadow:0 2px 8px rgba(0,0,0,.15);" onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 4px 16px rgba(0,0,0,.25)'" onmouseout="this.style.transform='';this.style.boxShadow='0 2px 8px rgba(0,0,0,.15)'">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Continue with Google
    </button>
    <button onclick="doFacebookLogin()" style="flex:1;display:flex;align-items:center;justify-content:center;gap:10px;padding:12px 16px;background:#1877f2;border:none;border-radius:9px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;transition:all .2s;font-family:inherit;box-shadow:0 2px 8px rgba(24,119,242,.35);" onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 4px 16px rgba(24,119,242,.5)'" onmouseout="this.style.transform='';this.style.boxShadow='0 2px 8px rgba(24,119,242,.35)'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      Continue with Facebook
    </button>
  </div>

  <div class="bottom-link" id="bottom-link">
    Don't have an account? <a onclick="switchTab('register')">Sign up free</a>
  </div>

  <div class="back-store">
    <a href="alibaba-style.html"><i class="fas fa-arrow-left"></i> Back to Store</a>
  </div>
</div>

<script>
function switchTab(t) {
  document.getElementById('form-login').style.display = t==='login' ? '' : 'none';
  document.getElementById('form-register').style.display = t==='register' ? '' : 'none';
  document.getElementById('form-forgot').style.display = 'none';
  document.getElementById('tab-login').classList.toggle('active', t==='login');
  document.getElementById('tab-register').classList.toggle('active', t==='register');
  document.getElementById('bottom-link').innerHTML = t==='login'
    ? "Don't have an account? <a onclick=\"switchTab('register')\">Sign up free</a>"
    : "Already have an account? <a onclick=\"switchTab('login')\">Login</a>";
  hideError();
}

function showForgotPassword() {
  document.getElementById('form-login').style.display = 'none';
  document.getElementById('form-register').style.display = 'none';
  document.getElementById('form-forgot').style.display = '';
  document.getElementById('bottom-link').innerHTML = '';
  hideError();
}

async function doForgotPassword() {
  var email = document.getElementById('fp-email').value.trim();
  hideError();
  if (!email) { showError('Please enter your email address.'); return; }
  var btn = document.getElementById('fp-btn');
  btn.textContent = 'SENDING...'; btn.disabled = true;
  try {
    var res = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    var data = await res.json();
    btn.textContent = 'SEND RESET LINK'; btn.disabled = false;
    if (res.ok) {
      showError('✓ New password sent to your email! Check your inbox.');
      document.getElementById('error-msg').style.background = 'rgba(34,197,94,.18)';
      document.getElementById('error-msg').style.borderColor = 'rgba(34,197,94,.4)';
      document.getElementById('error-msg').style.color = '#86efac';
    } else {
      showError(data.message || 'Could not send reset email. Try again.');
    }
  } catch(e) {
    btn.textContent = 'SEND RESET LINK'; btn.disabled = false;
    showError('Server error. Please try again.');
  }
}

function showError(msg) {
  var el = document.getElementById('error-msg');
  el.textContent = msg; el.style.display = 'block';
}
function hideError() { document.getElementById('error-msg').style.display = 'none'; }

async function doLogin() {
  var email = document.getElementById('l-email').value.trim();
  var pass = document.getElementById('l-pass').value;
  hideError();
  if (!email || !pass) { showError('Please enter your email and password.'); return; }
  var btn = document.getElementById('login-btn');
  btn.textContent = 'LOGGING IN...'; btn.disabled = true;
  try {
    var res = await fetch((window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1'?'http://localhost:3000/api':window.location.origin+'/api') + '/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email, password: pass })
    });
    var data = await res.json();
    if (res.ok) {
      localStorage.setItem('jobiToken', data.token);
      localStorage.setItem('currentUser', JSON.stringify(data.user));
      window.location.href = data.user && data.user.role === 'admin' ? 'admin.html' : 'alibaba-style.html';
    } else {
      showError(data.message || 'Invalid email or password.');
      btn.textContent = 'LOGIN'; btn.disabled = false;
    }
  } catch(e) {
    showError('Cannot connect to server. Make sure npm start is running.');
    btn.textContent = 'LOGIN'; btn.disabled = false;
  }
}

async function doRegister() {
  var name = document.getElementById('r-name').value.trim();
  var email = document.getElementById('r-email').value.trim();
  var pass = document.getElementById('r-pass').value;
  hideError();
  if (!name || !email || !pass) { showError('Please fill in all fields.'); return; }
  if (pass.length < 6) { showError('Password must be at least 6 characters.'); return; }
  var btn = document.getElementById('register-btn');
  btn.textContent = 'CREATING...'; btn.disabled = true;
  try {
    var res = await fetch((window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1'?'http://localhost:3000/api':window.location.origin+'/api') + '/auth/register', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ name, email, password: pass })
    });
    var data = await res.json();
    if (res.ok) {
      localStorage.setItem('jobiToken', data.token);
      localStorage.setItem('currentUser', JSON.stringify(data.user));
      window.location.href = data.user && data.user.role === 'admin' ? 'admin.html' : 'alibaba-style.html';
    } else {
      showError(data.message || 'Registration failed.');
      btn.textContent = 'CREATE ACCOUNT'; btn.disabled = false;
    }
  } catch(e) {
    showError('Cannot connect to server. Make sure npm start is running.');
    btn.textContent = 'CREATE ACCOUNT'; btn.disabled = false;
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  var loginVisible = document.getElementById('form-login').style.display !== 'none';
  if (loginVisible) doLogin(); else doRegister();
});

// ===== GOOGLE LOGIN =====
function doGoogleLogin() {
  // Show loading state on button
  var btn = event.currentTarget;
  var orig = btn.innerHTML;
  btn.innerHTML = '<div style="width:16px;height:16px;border:2px solid #e0e0e0;border-top:2px solid #f97316;border-radius:50%;animation:spin .8s linear infinite;"></div> Connecting...';
  btn.disabled = true;

  // Google OAuth — redirect to Google's auth page
  // For production: replace CLIENT_ID with your actual Google OAuth client ID
  var GOOGLE_CLIENT_ID = localStorage.getItem('googleClientId') || 'YOUR_GOOGLE_CLIENT_ID';
  var redirectUri = encodeURIComponent(window.location.origin + '/api/auth/google/callback');
  var scope = encodeURIComponent('openid email profile');
  var state = Math.random().toString(36).substring(2);
  localStorage.setItem('oauthState', state);

  // Try server-side OAuth first
  var apiBase = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    ? 'http://localhost:3000/api' : window.location.origin + '/api';

  fetch(apiBase + '/auth/google/url').then(function(r) { return r.json(); }).then(function(data) {
    if (data.url) {
      window.location.href = data.url;
    } else {
      // Fallback: show manual entry modal
      btn.innerHTML = orig; btn.disabled = false;
      showSocialModal('google');
    }
  }).catch(function() {
    btn.innerHTML = orig; btn.disabled = false;
    showSocialModal('google');
  });
}

// ===== FACEBOOK LOGIN =====
function doFacebookLogin() {
  var btn = event.currentTarget;
  var orig = btn.innerHTML;
  btn.innerHTML = '<div style="width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top:2px solid #fff;border-radius:50%;animation:spin .8s linear infinite;"></div> Connecting...';
  btn.disabled = true;

  var apiBase = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    ? 'http://localhost:3000/api' : window.location.origin + '/api';

  fetch(apiBase + '/auth/facebook/url').then(function(r) { return r.json(); }).then(function(data) {
    if (data.url) {
      window.location.href = data.url;
    } else {
      btn.innerHTML = orig; btn.disabled = false;
      showSocialModal('facebook');
    }
  }).catch(function() {
    btn.innerHTML = orig; btn.disabled = false;
    showSocialModal('facebook');
  });
}

// ===== SOCIAL LOGIN FALLBACK MODAL =====
function showSocialModal(provider) {
  var existing = document.getElementById('social-modal');
  if (existing) existing.remove();

  var isGoogle = provider === 'google';
  var color = isGoogle ? '#ea4335' : '#1877f2';
  var name = isGoogle ? 'Google' : 'Facebook';
  var icon = isGoogle
    ? '<svg width="22" height="22" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>'
    : '<svg width="22" height="22" viewBox="0 0 24 24" fill="#1877f2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>';

  var modal = document.createElement('div');
  modal.id = 'social-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;';
  modal.innerHTML = '<div style="background:#fff;border-radius:16px;padding:28px 24px;width:100%;max-width:380px;text-align:center;">' +
    '<div style="width:56px;height:56px;border-radius:50%;background:#f8f9fa;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;">' + icon + '</div>' +
    '<h3 style="font-size:17px;font-weight:700;color:#1a1a2e;margin-bottom:6px;">Sign in with ' + name + '</h3>' +
    '<p style="font-size:13px;color:#888;margin-bottom:20px;">Enter your ' + name + ' email to continue. We\'ll create or link your account automatically.</p>' +
    '<input type="email" id="social-email" placeholder="Your ' + name + ' email address" style="width:100%;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;margin-bottom:10px;font-family:inherit;" onfocus="this.style.borderColor=\'' + color + '\'" onblur="this.style.borderColor=\'#e0e0e0\'">' +
    '<input type="text" id="social-name" placeholder="Your full name" style="width:100%;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;margin-bottom:16px;font-family:inherit;" onfocus="this.style.borderColor=\'' + color + '\'" onblur="this.style.borderColor=\'#e0e0e0\'">' +
    '<div id="social-err" style="display:none;background:#fee2e2;color:#991b1b;padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:10px;"></div>' +
    '<button onclick="submitSocialLogin(\'' + provider + '\')" style="width:100%;background:' + color + ';color:#fff;border:none;padding:13px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px;" id="social-submit-btn">Continue with ' + name + '</button>' +
    '<button onclick="document.getElementById(\'social-modal\').remove()" style="width:100%;background:none;border:1px solid #e0e0e0;padding:11px;border-radius:8px;font-size:13px;color:#666;cursor:pointer;font-family:inherit;">Cancel</button>' +
    '</div>';
  document.body.appendChild(modal);
  setTimeout(function() { var el = document.getElementById('social-email'); if(el) el.focus(); }, 100);
}

async function submitSocialLogin(provider) {
  var email = document.getElementById('social-email').value.trim();
  var name = document.getElementById('social-name').value.trim();
  var errEl = document.getElementById('social-err');
  var btn = document.getElementById('social-submit-btn');

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errEl.textContent = 'Please enter a valid email address.'; errEl.style.display = 'block'; return;
  }
  if (!name || name.length < 2) {
    errEl.textContent = 'Please enter your full name.'; errEl.style.display = 'block'; return;
  }

  btn.textContent = 'Signing in...'; btn.disabled = true;
  var apiBase = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    ? 'http://localhost:3000/api' : window.location.origin + '/api';

  try {
    // Try to login first, then register if not found
    var res = await fetch(apiBase + '/auth/social-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, name, provider })
    });
    var data = await res.json();
    if (res.ok && data.token) {
      localStorage.setItem('jobiToken', data.token);
      localStorage.setItem('currentUser', JSON.stringify(data.user));
      document.getElementById('social-modal').remove();
      showError('✓ Signed in successfully! Redirecting...');
      document.getElementById('error-msg').style.background = 'rgba(34,197,94,.18)';
      document.getElementById('error-msg').style.borderColor = 'rgba(34,197,94,.4)';
      document.getElementById('error-msg').style.color = '#86efac';
      document.getElementById('error-msg').style.display = 'block';
      setTimeout(function() { window.location.href = 'alibaba-style.html'; }, 1200);
    } else {
      // Fallback: register with social provider
      var regRes = await fetch(apiBase + '/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password: provider + '_' + Date.now(), socialProvider: provider })
      });
      var regData = await regRes.json();
      if (regRes.ok && regData.token) {
        localStorage.setItem('jobiToken', regData.token);
        localStorage.setItem('currentUser', JSON.stringify(regData.user));
        document.getElementById('social-modal').remove();
        setTimeout(function() { window.location.href = 'alibaba-style.html'; }, 800);
      } else {
        errEl.textContent = regData.message || 'Could not sign in. Please try the email/password form.';
        errEl.style.display = 'block';
        btn.textContent = 'Continue'; btn.disabled = false;
      }
    }
  } catch(e) {
    errEl.textContent = 'Server not reachable. Please use email/password login.';
    errEl.style.display = 'block';
    btn.textContent = 'Continue'; btn.disabled = false;
  }
}

</script>
